# Simple POS — Public Shopify App

client_id = "da833485148d66ce83141e6b2e7756f3"
application_url = "https://example.com"
embedded = true
name = "Simple POS"

[access_scopes]
scopes = "write_products,read_products,write_metaobjects,write_metaobject_definitions,write_draft_orders,read_orders,write_orders,write_customers,read_customers,read_inventory,write_inventory,read_locations"

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

[auth]
redirect_urls = [ "https://example.com/api/auth" ]

[build]
include_config_on_deploy = true
automatically_update_urls_on_dev = true