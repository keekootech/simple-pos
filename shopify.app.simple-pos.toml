# Simple POS — Public Shopify App

client_id = "da833485148d66ce83141e6b2e7756f3"
name = "Simple POS"
application_url = "https://simple-pos-production-36de.up.railway.app"
embedded = true

[build]
automatically_update_urls_on_dev = false

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

[[webhooks.subscriptions]]
compliance_topics = ["customers/data_request", "customers/redact", "shop/redact"]
uri = "https://simple-pos-production-36de.up.railway.app/webhooks"

[access_scopes]
scopes = "write_products,read_products,write_metaobjects,write_metaobject_definitions,write_draft_orders,read_orders,write_orders,write_customers,read_customers,read_inventory,write_inventory,read_locations"

[auth]
redirect_urls = [ "https://simple-pos-production-36de.up.railway.app/api/auth" ]
